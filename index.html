<!DOCTYPE html>
<html>
<head>
    <title>My Terraform Website</title>
    <style>
        body {
            margin: 0;
            font-family: "Times New Roman", serif;
            background: linear-gradient(to right, #5a0f1c, #8b1e2d); /* maroon gradient */
            color: white;
            text-align: center;
        }

        .container {
            padding: 100px 20px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .btn {
            background: white;
            color: #8b1e2d;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #8b1e2d;
            color: white;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1> My Static Website</h1>
            <p>Deployed using Terraform + Nginx on AWS EC2</p>
            <button class="btn">DevOps Project</button>
        </div>

        <footer>
            <p>Built by Vesa | Cloud & DevOps</p>
        </footer>
    </div>
</body>
</html>
