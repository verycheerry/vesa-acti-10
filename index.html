<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vesa DevOps Website</title>

    <style>
        body {
            margin: 0;
            font-family: "Times New Roman", serif;
            background: linear-gradient(135deg, #5a0f1c, #8b1e2d);
            color: white;
            text-align: center;
        }

        .container {
            padding: 100px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        p {
            font-size: 20px;
            margin-bottom: 25px;
        }

        .btn {
            background: white;
            color: #8b1e2d;
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #8b1e2d;
            color: white;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>My Static Website</h1>
            <p>Deployed using Terraform, Nginx, and AWS EC2</p>
            <button class="btn">DevOps Project</button>
        </div>

        <footer>
            <p>Built by Vesa | Cloud & DevOps</p>
        </footer>
    </div>
</body>
</html>
